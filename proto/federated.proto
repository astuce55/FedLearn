syntax = "proto3";
package federated;

service FederatedLearningService {
  rpc RegisterClient(RegisterRequest)   returns (RegisterResponse);
  rpc GetGlobalModel(ModelRequest)      returns (ModelResponse);
  rpc SendLocalUpdate(LocalUpdate)      returns (UpdateAck);
  rpc Heartbeat(HeartbeatRequest)       returns (HeartbeatResponse);
  rpc ElectionMessage(ElectionRequest)  returns (ElectionResponse);
  rpc StartRound(StartRoundRequest)     returns (StartRoundResponse);
  rpc GetStatus(StatusRequest)          returns (StatusResponse);
  rpc RemoveClient(RemoveClientRequest) returns (RemoveClientResponse);
}

message RegisterRequest {
  string client_name   = 1;
  string ip_address    = 2;
  int32  port          = 3;
  int32  dataset_size  = 4;
  map<string, string> attributes = 5;
  int64  lamport_timestamp = 6;
}

message RegisterResponse {
  bool   success         = 1;
  string assigned_id     = 2;
  string structured_name = 3;
  int64  lamport_timestamp = 4;
}

message ModelRequest {
  string client_id         = 1;
  int64  lamport_timestamp = 2;
}

message ModelResponse {
  repeated float weights   = 1;
  int32  round_number      = 2;
  int64  lamport_timestamp = 3;
}

message LocalUpdate {
  string client_id         = 1;
  repeated float weights   = 2;
  int32  dataset_size      = 3;
  int32  round_number      = 4;
  int64  lamport_timestamp = 5;
}

// received (pas success) — cohérent avec l'ancienne version
message UpdateAck {
  bool  received           = 1;
  int64 lamport_timestamp  = 2;
}

message HeartbeatRequest {
  string sender_id         = 1;
  int64  lamport_timestamp = 2;
}

message HeartbeatResponse {
  bool  alive              = 1;
  int64 lamport_timestamp  = 2;
}

message ElectionRequest {
  string candidate_id      = 1;
  int64  lamport_timestamp = 2;
}

message ElectionResponse {
  bool  accepted           = 1;
  int64 lamport_timestamp  = 2;
}

// Nouveau : le serveur signale aux clients qu'un round démarre
message StartRoundRequest {
  int32 nb_clients         = 1;
  int64 lamport_timestamp  = 2;
}

message StartRoundResponse {
  int32 round_number       = 1;
  int64 lamport_timestamp  = 2;
}

// Nouveau : le client interroge le statut du serveur
message StatusRequest {}

message StatusResponse {
  int32          nb_clients     = 1;
  int32          round_actuel   = 2;
  bool           round_en_cours = 3;
  repeated float poids          = 4;
}

// Nouveau : supprimer un client
message RemoveClientRequest {
  string client_id = 1;
}

message RemoveClientResponse {
  bool success = 1;
}